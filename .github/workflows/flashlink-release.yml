name: FlashLink Android Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub release
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: flashlink-android-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore official signing identity
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > flashlink-release.keystore
          {
            printf 'keystore.password=%s\n' "$STORE_PASSWORD"
            printf 'key.alias=%s\n' "$KEY_ALIAS"
            printf 'key.password=%s\n' "$KEY_PASSWORD"
          } > signing.properties
          {
            printf 'custom.application.id=cc.flashlink.vpn\n'
            printf 'remove.suffix=true\n'
          } > local.properties

      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' build.gradle.kts | head -1)"
          code="$(sed -n 's/.*versionCode = \([0-9]*\).*/\1/p' build.gradle.kts | head -1)"
          test -n "$version"
          test -n "$code"
          echo "name=$version" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Build signed APK and AAB
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --console=plain :app:assembleAlphaRelease :app:bundleAlphaRelease

      - name: Verify and stage artifacts
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          set -euo pipefail
          apk="$(find app/build/outputs/apk/alpha/release -name '*.apk' -print -quit)"
          aab="$(find app/build/outputs/bundle/alphaRelease -name '*.aab' -print -quit)"
          test -f "$apk"
          test -f "$aab"
          mkdir -p release
          cp "$apk" "release/FlashLink_${VERSION}_android_arm64.apk"
          cp "$aab" "release/FlashLink_${VERSION}_android_arm64.aab"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "release/FlashLink_${VERSION}_android_arm64.apk"
          sha256sum release/* > release/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlashLink-Android-${{ steps.version.outputs.name }}
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK to official website
        env:
          RELEASE_SSH_KEY: ${{ secrets.RELEASE_SSH_KEY }}
          RELEASE_SSH_HOST: ${{ secrets.RELEASE_SSH_HOST }}
          RELEASE_SSH_USER: ${{ secrets.RELEASE_SSH_USER }}
          RELEASE_SSH_PORT: ${{ secrets.RELEASE_SSH_PORT }}
          RELEASE_SSH_DIR: ${{ secrets.RELEASE_SSH_DIR }}
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "$RELEASE_SSH_KEY" > ~/.ssh/flashlink_release
          chmod 600 ~/.ssh/flashlink_release
          ssh-keyscan -p "$RELEASE_SSH_PORT" "$RELEASE_SSH_HOST" >> ~/.ssh/known_hosts
          source="release/FlashLink_${VERSION}_android_arm64.apk"
          remote_tmp="$RELEASE_SSH_DIR/.FlashLink_android_arm64_latest.apk.tmp"
          remote_final="$RELEASE_SSH_DIR/FlashLink_android_arm64_latest.apk"
          scp -i ~/.ssh/flashlink_release -P "$RELEASE_SSH_PORT" "$source" "$RELEASE_SSH_USER@$RELEASE_SSH_HOST:$remote_tmp"
          ssh -i ~/.ssh/flashlink_release -p "$RELEASE_SSH_PORT" "$RELEASE_SSH_USER@$RELEASE_SSH_HOST" \
            "mv '$remote_tmp' '$remote_final' && chmod 664 '$remote_final'"

      - name: Verify official download
        run: |
          curl --fail --silent --show-error --head \
            https://7a.cc.cd/downloads/flashlink/FlashLink_android_arm64_latest.apk

      - name: Publish GitHub release
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.name }}
          name: FlashLink Android ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: release/*
